# .github/workflows/daily_gee.yml
# Place this file at: .github/workflows/daily_gee.yml in your repo

name: Daily GEE Real Data

on:
  schedule:
    - cron: '0 6 * * *'    # Every day 06:00 UTC
  workflow_dispatch:         # Manual trigger from GitHub UI

jobs:
  precompute:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install earthengine-api numpy requests pandas

      - name: Write GEE service account key
        run: |
          echo '${{ secrets.GEE_SERVICE_ACCOUNT_JSON }}' \
          > hsae-gee-service.json

      - name: Run pre-computation
        run: python precompute_gee_daily.py

      - name: Commit real data to repo
        run: |
          git config user.name  "HSAE GEE Bot"
          git config user.email "bot@hsae.io"
          git add data/gee_realtime.json
          git diff --staged --quiet || \
            git commit -m "🛰️ Daily GEE update $(date -u +%Y-%m-%d)"
          git push
