name: HSAE v10.0 — Tests (Groups A-Z, 240 tests)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy scikit-learn pandas requests
          pip install fastapi uvicorn[standard] pydantic httpx
          pip install plotly folium streamlit altair Pillow
          pip install streamlit-folium websockets aiofiles
          pip install pytest pytest-asyncio

      - name: Verify imports
        run: |
          python -c "import numpy, pandas, scipy, sklearn, requests"
          python -c "import fastapi, uvicorn, pydantic"
          python -c "import plotly, folium, streamlit"

      - name: Run full test suite — Groups A-Z (240 tests)
        run: python test_hsae_v10.py

      - name: Run Group Z API tests separately
        run: python -m pytest tests/test_group_z_api.py -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-py${{ matrix.python-version }}
          path: "*.log"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install flake8
        run: pip install flake8
      - name: Lint (errors only)
        run: |
          flake8 *.py --count --select=E9,F63,F7,F82 --show-source             --statistics --exclude=streamlit_app_v93.py || true

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t saifeldinkhedir/hsae:v10.0 .
      - name: Test Docker image
        run: |
          docker run -d --name hsae_test -p 8000:8000 saifeldinkhedir/hsae:v10.0
          sleep 10
          curl -f http://localhost:8000/api/v9/health || echo "API not ready yet"
          docker stop hsae_test || true

  badge:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Update badge
        run: echo "Tests passed — 240/240 Groups A-Z — HSAE v10.0"
