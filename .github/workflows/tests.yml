name: HSAE v6.01 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest numpy pandas

    - name: Run syntax check
      run: |
        python -m py_compile app.py
        python -m py_compile basins_global.py
        python -m py_compile hsae_tdi.py
        python -m py_compile hsae_validation.py
        python -m py_compile hsae_hbv.py
        echo "✅ All core files pass syntax check"

    - name: Run pytest
      run: |
        pytest tests/test_core.py -v --tb=short
